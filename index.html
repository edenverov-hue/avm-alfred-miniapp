<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AVM Engineering</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root {
  --bg:#fff; --surface:#F8F9FB; --navy:#1B2B4B; --navy-l:#2D4270;
  --gold:#C8860A; --text:#1B2B4B; --text2:#6B7A99; --sep:#E8ECF4;
  --ok:#0F7B55; --warn:#B85C00; --danger:#B51C1C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;
  min-height:100vh;padding-bottom:calc(64px + env(safe-area-inset-bottom,0px));
  -webkit-font-smoothing:antialiased}
.pf{font-family:'Playfair Display',serif}
.mono{font-family:'JetBrains Mono',monospace}

/* Header */
.hdr{padding:20px 20px 12px;border-bottom:1px solid var(--sep)}
.hdr-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy);letter-spacing:-0.3px}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:100;
  background:#fff;border-top:1px solid var(--sep);
  padding-bottom:env(safe-area-inset-bottom,0px)}
.bnav button{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text2);transition:all 0.2s;position:relative}
.bnav button.on{color:#fff;background:var(--navy)}
.bnav button .ni{font-size:20px;line-height:1}
.bnav .badge{position:absolute;top:4px;right:calc(50% - 16px);
  background:var(--danger);color:#fff;font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:6px;min-width:14px;text-align:center}

/* Content */
.cnt{padding:0 20px 20px;max-width:540px;margin:0 auto}
.sec{margin-top:24px}
.sec-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--navy);
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--sep)}

/* Process Flow */
.flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:8px 0 12px;-webkit-overflow-scrolling:touch}
.flow-step{flex-shrink:0;width:90px;text-align:center;position:relative}
.flow-box{background:var(--surface);border:1px solid var(--sep);border-radius:2px;padding:10px 6px;
  min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flow-box.gate{border-left:3px solid var(--gold)}
.flow-box.problem{border-color:var(--danger)}
.flow-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);font-weight:500}
.flow-name{font-size:11px;font-weight:600;color:var(--navy);margin:3px 0 2px}
.flow-role{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:0.5px}
.flow-dot{width:6px;height:6px;border-radius:50%;margin-top:4px}
.flow-arrow{position:absolute;right:-8px;top:50%;transform:translateY(-50%);
  color:var(--sep);font-size:14px;z-index:1}

/* Cards */
.card{background:var(--surface);border-radius:2px;padding:14px 16px;margin-bottom:8px;
  border-left:3px solid var(--sep);transition:background 0.15s}
.card:active{background:var(--sep)}
.card-d{border-left-color:var(--danger)}
.card-w{border-left-color:var(--warn)}
.card-g{border-left-color:var(--ok)}
.card-n{border-left-color:var(--navy)}
.card-gold{border-left-color:var(--gold)}
.ct{font-size:14px;font-weight:600;color:var(--navy);line-height:1.3}
.cm{font-size:11px;color:var(--text2);margin-top:3px}
.cm .mono{font-size:11px}
.cbtn-row{display:flex;gap:8px;margin-top:10px}
.cbtn{flex:1;padding:10px;border-radius:2px;border:1px solid var(--sep);font-size:12px;
  font-weight:700;cursor:pointer;text-align:center;transition:opacity 0.15s;
  font-family:'Source Sans 3',sans-serif}
.cbtn:active{opacity:0.6}
.cbtn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.cbtn-no{background:#fff;color:var(--danger);border-color:var(--danger)}

/* Org Tree */
.tree{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:2}
.tree-line{display:flex;align-items:center;padding:2px 0}
.tree-indent{color:var(--sep);white-space:pre}
.tree-role{font-weight:700;color:var(--navy);min-width:80px;display:inline-block}
.tree-dash{color:var(--sep);margin:0 6px}
.tree-person{color:var(--text)}
.tree-empty{color:var(--text2);font-style:italic}
.tree-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

/* Kronika */
.kron-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--sep)}
.kron-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--navy-l);
  min-width:60px;flex-shrink:0;padding-top:2px}
.kron-body{flex:1}
.kron-title{font-size:13px;font-weight:600;color:var(--navy)}
.kron-meta{font-size:11px;color:var(--text2);margin-top:2px}

/* Badges */
.badge-sm{font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;display:inline-block}
.badge-navy{background:var(--navy);color:#fff}
.badge-gold{background:var(--gold);color:#fff}
.badge-ok{background:#E8F5E9;color:var(--ok)}
.badge-warn{background:#FFF3E0;color:var(--warn)}
.badge-danger{background:#FFEBEE;color:var(--danger)}

.empty{text-align:center;padding:32px 16px;color:var(--text2);font-size:13px}
.skel{background:var(--sep);border-radius:2px;animation:sk 1.5s ease infinite}
@keyframes sk{0%,100%{opacity:.3}50%{opacity:.6}}
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">AVM Engineering</div>
  <div class="hdr-sub" id="hdr-time"></div>
</div>

<div class="cnt" id="cnt">
  <div style="padding:32px 0"><div class="skel" style="width:70%;height:16px;margin:0 auto 12px"></div>
  <div class="skel" style="width:90%;height:50px;margin:0 auto 8px"></div>
  <div class="skel" style="width:90%;height:50px;margin:0 auto"></div></div>
</div>

<nav class="bnav" id="bnav">
  <button class="on" onclick="go('map',this)"><span class="ni">&#9635;</span>Mapa</button>
  <button onclick="go('org',this)"><span class="ni">&#9783;</span>Org</button>
  <button onclick="go('kronika',this)"><span class="ni">&#9776;</span>Kronika</button>
  <button onclick="go('decyzje',this)" style="position:relative"><span class="ni">&#9733;</span>Decyzje<span class="badge" id="dec-badge" style="display:none">0</span></button>
</nav>

<script>
const API = "";
const CEO_ID = "950876530";
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#ffffff');tg.setBackgroundColor('#ffffff')}
const uid = tg?.initDataUnsafe?.user?.id?.toString()||"unknown";
const isCeo = uid===CEO_ID;

async function api(ep){
  try{const r=await fetch(API+ep,{headers:{"X-Chat-Id":uid}});if(!r.ok)throw r.status;return await r.json()}
  catch(e){console.error(e);return null}
}

function go(id,btn){
  document.querySelectorAll(".bnav button").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  render(id);
}

async function render(id){
  const c=document.getElementById("cnt");
  c.innerHTML='<div style="padding:32px 0"><div class="skel" style="width:80%;height:50px;margin:8px auto"></div><div class="skel" style="width:80%;height:50px;margin:8px auto"></div></div>';
  switch(id){
    case"map":await rMap();break;
    case"org":await rOrg();break;
    case"kronika":await rKronika();break;
    case"decyzje":await rDecyzje();break;
  }
  document.getElementById("hdr-time").textContent=new Date().toLocaleTimeString("pl",{hour:"2-digit",minute:"2-digit"})+" · "+new Date().toLocaleDateString("pl",{day:"numeric",month:"short"});
}

// ═══ MAPA ═══════════════════════════════════════════════

const FLOW=[
  {id:"SOP-01",name:"Sprzedaz",role:"KVP",gate:false},
  {id:"SOP-04",name:"Przekazanie",role:"PM",gate:true},
  {id:"SOP-05",name:"Planowanie",role:"PM",gate:false},
  {id:"SOP-06",name:"Montaz",role:"FOREMAN",gate:true},
  {id:"SOP-09",name:"Zamkniecie",role:"FIN",gate:true},
];

async function rMap(){
  const [dash,threads]=await Promise.all([api("/api/dashboard"),api("/api/threads")]);
  if(!dash){document.getElementById("cnt").innerHTML='<div class="empty">Brak polaczenia</div>';return}

  const tasks=dash.tasks||[];
  const today=new Date().toISOString().slice(0,10);
  const active=tasks.filter(t=>t.status!=="closed"&&t.status!=="cancelled");
  const openT=(threads?.threads||[]).filter(t=>t.status==="open");

  // Flow
  let flowH='<div class="sec"><div class="sec-title">Procesy AVM</div><div class="flow">';
  FLOW.forEach((s,i)=>{
    const hasProblem=active.some(t=>(t.owner_role||"").includes(s.role)&&t.priority==="H");
    flowH+=`<div class="flow-step">
      <div class="flow-box ${s.gate?'gate':''} ${hasProblem?'problem':''}">
        <div class="flow-id mono">${s.id}</div>
        <div class="flow-name">${s.name}</div>
        <div class="flow-role">${s.role}</div>
        <div class="flow-dot" style="background:${hasProblem?'var(--danger)':'var(--ok)'}"></div>
      </div>
      ${i<FLOW.length-1?'<div class="flow-arrow">&rarr;</div>':''}
    </div>`;
  });
  flowH+='</div></div>';

  // Aktywne sprawy
  let spH='<div class="sec"><div class="sec-title">Aktywne sprawy</div>';
  if(!active.length&&!openT.length){spH+='<div class="empty">Brak aktywnych spraw</div>'}

  // Overdue first
  const overdue=active.filter(t=>t.deadline&&t.deadline<today);
  overdue.forEach(t=>{
    const days=Math.ceil((new Date()-new Date(t.deadline))/864e5);
    spH+=`<div class="card card-d"><div class="ct">${(t.title||'').slice(0,50)}</div>
      <div class="cm">${t.owner_role||''} &middot; <span class="mono badge-sm badge-danger">+${days}d</span></div></div>`;
  });

  // High priority
  active.filter(t=>t.priority==="H"&&!overdue.includes(t)).forEach(t=>{
    spH+=`<div class="card card-w"><div class="ct">${(t.title||'').slice(0,50)}</div>
      <div class="cm">${t.owner_role||''} &middot; <span class="mono">${t.deadline||''}</span> &middot; <span class="badge-sm badge-warn">H</span></div></div>`;
  });

  // Pending verification
  active.filter(t=>t.status==="pending_verification").forEach(t=>{
    spH+=`<div class="card card-gold"><div class="ct">${(t.title||'').slice(0,50)}</div>
      <div class="cm">${t.owner_role||t.owner_person||''} &middot; Do weryfikacji</div></div>`;
  });

  // Threads
  openT.forEach(t=>{
    spH+=`<div class="card card-n"><div class="ct">${t.id}: ${t.title}</div>
      <div class="cm">od <span class="mono">${t.opened}</span> &middot; ${(t.tags||[]).slice(0,3).join(', ')}</div></div>`;
  });

  spH+='</div>';

  // Update decision badge
  const pendingCount=active.filter(t=>t.status==="pending_verification").length+overdue.length;
  const b=document.getElementById("dec-badge");
  if(pendingCount>0){b.textContent=pendingCount;b.style.display=""}else{b.style.display="none"}

  document.getElementById("cnt").innerHTML=flowH+spH;
}

// ═══ ORGANIZACJA ════════════════════════════════════════

const TREE=[
  {role:"CEO",indent:"",person:null,dot:"ok"},
  {role:"KVP",indent:"  \u251C\u2500 ",person:null,dot:"empty"},
  {role:"HUNTER",indent:"  \u2502   \u251C\u2500 ",person:null,dot:"empty"},
  {role:"FARMER",indent:"  \u2502   \u2514\u2500 ",person:null,dot:"empty"},
  {role:"AM",indent:"  \u2502   ",person:null,dot:"empty"},
  {role:"PM",indent:"  \u251C\u2500 ",person:null,dot:"empty"},
  {role:"TECH",indent:"  \u2502   \u251C\u2500 ",person:null,dot:"empty"},
  {role:"FOREMAN",indent:"  \u2502   \u251C\u2500 ",person:null,dot:"empty"},
  {role:"SERVICE",indent:"  \u2502   \u2514\u2500 ",person:null,dot:"empty"},
  {role:"FIN",indent:"  \u2514\u2500 ",person:null,dot:"empty"},
];

async function rOrg(){
  const data=await api("/api/org");
  if(!data){document.getElementById("cnt").innerHTML='<div class="empty">Brak danych</div>';return}
  const roles=data.roles||{};

  let h='<div class="sec"><div class="sec-title">Struktura AVM Engineering</div><div class="tree">';
  TREE.forEach(t=>{
    const r=roles[t.role]||{};
    const person=r.person;
    const active=r.active;
    const dotColor=active?"var(--ok)":person?"var(--warn)":"var(--sep)";
    h+=`<div class="tree-line">
      <span class="tree-indent">${t.indent}</span>
      <span class="tree-dot" style="background:${dotColor}"></span>
      <span class="tree-role">${t.role}</span>
      <span class="tree-dash">&mdash;</span>
      ${person?`<span class="tree-person">${person}</span>`:'<span class="tree-empty">nieobsadzony</span>'}
    </div>`;
  });
  h+='</div></div>';

  document.getElementById("cnt").innerHTML=h;
}

// ═══ KRONIKA ════════════════════════════════════════════

async function rKronika(){
  const [threads,scribe]=await Promise.all([api("/api/threads"),api("/api/analytics/scribe")]);

  let h='';

  // Watki
  const allT=(threads?.threads||[]);
  const openT=allT.filter(t=>t.status==="open");
  h+=`<div class="sec"><div class="sec-title">Watki otwarte (${openT.length})</div>`;
  if(!openT.length){h+='<div class="empty">Brak otwartych watkow</div>'}
  openT.forEach(t=>{
    h+=`<div class="card card-n">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="ct">${t.id}: ${t.title}</div>
        <span class="badge-sm badge-navy">AKTYWNY</span>
      </div>
      <div class="cm">od <span class="mono">${t.opened}</span> &middot; ${(t.tags||[]).slice(0,3).join(', ')}</div>
      ${(t.history||[]).slice(0,2).map(h2=>`<div style="font-size:11px;color:var(--text2);padding:3px 0;margin-top:4px;border-top:1px solid var(--sep)">${h2.date} &mdash; ${(h2.source||'').slice(0,50)}</div>`).join('')}
    </div>`;
  });
  h+='</div>';

  // Spotkania stats
  h+=`<div class="sec"><div class="sec-title">Spotkania</div>
    <div style="display:flex;gap:16px;padding:12px 0">
      <div style="text-align:center;flex:1;padding:12px;background:var(--surface);border-radius:2px">
        <div class="mono" style="font-size:24px;font-weight:700;color:var(--navy)">${scribe?.total_meetings||0}</div>
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Przetworzone</div>
      </div>
      <div style="text-align:center;flex:1;padding:12px;background:var(--surface);border-radius:2px">
        <div class="mono" style="font-size:24px;font-weight:700;color:var(--navy)">${scribe?.total_tasks||0}</div>
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Zadan</div>
      </div>
      <div style="text-align:center;flex:1;padding:12px;background:var(--surface);border-radius:2px">
        <div class="mono" style="font-size:24px;font-weight:700;color:var(--navy)">${scribe?.total_decisions||0}</div>
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Decyzji</div>
      </div>
    </div>
  </div>`;

  // RACI mini
  h+=`<div class="sec"><div class="sec-title">RACI</div>
    <div class="card" style="cursor:pointer" onclick="loadRaci()">
      <div class="ct">Matryca odpowiedzialnosci</div>
      <div class="cm">11 SOP &middot; 12 rol &middot; Dotknij aby rozwinac</div>
    </div>
    <div id="raci-detail"></div>
  </div>`;

  document.getElementById("cnt").innerHTML=h;
}

async function loadRaci(){
  const d=document.getElementById("raci-detail");
  if(d.innerHTML){d.innerHTML="";return}
  const data=await api("/api/raci");
  if(!data)return;
  const roles=data.roles||[];
  d.innerHTML=`<div style="overflow-x:auto;margin-top:8px"><table style="width:100%;border-collapse:collapse;font-size:11px">
    <tr>${['SOP',...roles].map(r=>`<th style="padding:6px 4px;background:var(--surface);color:var(--text2);font-weight:600;text-align:center;border-bottom:1px solid var(--sep)">${r}</th>`).join('')}</tr>
    ${(data.matrix||[]).map(row=>`<tr><td style="padding:5px 4px;border-bottom:1px solid var(--sep);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:10px">${row.sop}</td>
      ${roles.map(r=>{const v=row[r]||'';return`<td style="padding:5px 4px;border-bottom:1px solid var(--sep);text-align:center;font-weight:${v.includes('A')?'700':'400'};color:${v.includes('A')?'var(--danger)':v.includes('R')?'var(--gold)':'var(--text2)'}">${v}</td>`}).join('')}
    </tr>`).join('')}
  </table></div>`;
}

// ═══ DECYZJE ════════════════════════════════════════════

async function rDecyzje(){
  const dash=await api("/api/dashboard");
  if(!dash){document.getElementById("cnt").innerHTML='<div class="empty">Brak danych</div>';return}

  const tasks=dash.tasks||[];
  const today=new Date().toISOString().slice(0,10);
  const pending=tasks.filter(t=>t.status==="pending_verification");
  const overdue=tasks.filter(t=>t.deadline&&t.deadline<today&&t.status!=="closed");
  const critical=tasks.filter(t=>t.priority==="H"&&t.status!=="closed"&&!overdue.includes(t));
  const decisions=[...overdue,...pending,...critical];

  let h=`<div class="sec"><div class="sec-title">Oczekuje Twojej decyzji <span class="badge-sm badge-navy" style="margin-left:8px">${decisions.length}</span></div>`;

  if(!decisions.length){
    h+=`<div style="text-align:center;padding:40px 16px">
      <div style="font-size:32px;margin-bottom:12px;color:var(--ok)">&#10003;</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--navy)">Wszystko zatwierdzone</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">Brak spraw wymagajacych decyzji</div>
    </div>`;
  }

  overdue.forEach(t=>{
    const days=Math.ceil((new Date()-new Date(t.deadline))/864e5);
    h+=decCard(t,"PRZETERMINOWANE",`+${days} dni`,true);
  });
  pending.forEach(t=>{h+=decCard(t,"DO WERYFIKACJI","ZROBIONE zgloszone",true)});
  critical.forEach(t=>{h+=decCard(t,"PRIORYTET H",t.deadline||"brak deadline",true)});

  h+='</div>';
  document.getElementById("cnt").innerHTML=h;
}

function decCard(t,type,ctx,actions){
  const typeColor=type.includes("PRZETERMIN")?"badge-danger":type.includes("WERYFIK")?"badge-gold":"badge-warn";
  return`<div class="card card-n">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">
      <span class="badge-sm ${typeColor}">${type}</span>
      <span class="mono" style="font-size:10px;color:var(--text2)">${ctx}</span>
    </div>
    <div class="ct">${(t.title||'').slice(0,55)}</div>
    <div class="cm">${t.owner_role||t.owner_person||''} &middot; <span class="mono">${t.deadline||''}</span></div>
    ${actions&&isCeo?`<div class="cbtn-row">
      <button class="cbtn cbtn-ok">Zatwierdz</button>
      <button class="cbtn cbtn-no">Odrzuc</button>
    </div>`:''}
  </div>`;
}

// ═══ INIT ═══════════════════════════════════════════════
render("map");
</script>
</body>
</html>
