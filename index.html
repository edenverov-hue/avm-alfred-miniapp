<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AVM — Pulse</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --accent: #e8a000;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #22c55e;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--tg-theme-bg-color, var(--bg));
      color: var(--tg-theme-text-color, var(--text));
      font-family: 'DM Sans', -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 70px);
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'DM Mono', monospace; }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
    .header-status { margin-left: auto; font-size: 11px; color: var(--muted); }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; z-index: 100;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-item {
      flex: 1; padding: 10px 0 8px; text-align: center;
      color: var(--muted); font-size: 10px; font-weight: 600;
      cursor: pointer; transition: color 0.2s;
      border: none; background: none;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-badge {
      position: absolute; top: 4px; right: calc(50% - 18px);
      background: var(--danger); color: #fff;
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 8px; min-width: 14px; text-align: center;
    }

    /* Content */
    .content { padding: 0 16px 80px; max-width: 500px; margin: 0 auto; }
    .screen-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 16px 0 12px; }

    /* Pulse Cards */
    .pulse-section { margin-bottom: 20px; }
    .pulse-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 4px 0; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; }

    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px;
      border-left: 4px solid var(--border);
      animation: slideUp 0.3s ease-out both;
    }
    .card-danger { border-left-color: var(--danger); }
    .card-warn { border-left-color: var(--warn); }
    .card-ok { border-left-color: var(--ok); }
    .card-accent { border-left-color: var(--accent); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .card-actions { display: flex; gap: 8px; margin-top: 10px; }

    .btn {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-align: center; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn-ok { background: var(--ok); color: #000; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: var(--border); color: var(--text); }

    .countdown { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
    .countdown-urgent { color: var(--danger); }
    .countdown-soon { color: var(--warn); }

    /* Team Cards */
    .person-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; background: var(--surface); border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .avatar-active { background: var(--ok); color: #000; }
    .avatar-empty { background: var(--border); color: var(--muted); }
    .person-info { flex: 1; }
    .person-name { font-size: 15px; font-weight: 600; }
    .person-role { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .person-tasks { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* System Section */
    .sys-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: var(--surface); border-radius: var(--radius);
      margin-bottom: 8px; cursor: pointer;
    }
    .sys-label { font-size: 14px; font-weight: 500; }
    .sys-value { font-size: 13px; color: var(--muted); }
    .sys-icon { font-size: 18px; margin-right: 10px; }
    .expand-content { display: none; padding: 0 16px 16px; background: var(--surface); border-radius: 0 0 var(--radius) var(--radius); margin-top: -8px; margin-bottom: 8px; }

    /* Status Bar */
    .status-bar {
      display: flex; gap: 0; border-radius: 8px; overflow: hidden;
      height: 6px; margin-bottom: 16px;
    }
    .status-seg { transition: width 0.5s ease; }

    .skeleton { background: var(--border); border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">AVM</div>
  <div class="header-status" id="hdr-status"></div>
</div>

<div class="content" id="content">
  <div style="padding:40px 0;text-align:center;color:var(--muted)">
    <div class="skeleton" style="width:60%;height:20px;margin:0 auto 12px"></div>
    <div class="skeleton" style="width:80%;height:60px;margin:0 auto 12px"></div>
    <div class="skeleton" style="width:80%;height:60px;margin:0 auto"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-item active" onclick="go('focus')" style="position:relative">
    <span class="nav-icon">&#9889;</span>Teraz<span class="nav-badge" id="badge-focus" style="display:none">0</span>
  </button>
  <button class="nav-item" onclick="go('projects')">
    <span class="nav-icon">&#128188;</span>Projekty
  </button>
  <button class="nav-item" onclick="go('team')">
    <span class="nav-icon">&#128101;</span>Zespol
  </button>
  <button class="nav-item" onclick="go('system')">
    <span class="nav-icon">&#9881;</span>System
  </button>
</nav>

<script>
const API_BASE = window.ALFRED_API_URL || "";
const CEO_ID = "950876530";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const user = tg?.initDataUnsafe?.user;
const chat_id = user?.id?.toString() || "unknown";
const is_ceo = chat_id === CEO_ID;

let currentScreen = "focus";

async function api(ep) {
  try {
    const r = await fetch(API_BASE + ep, {headers:{"X-Chat-Id":chat_id}});
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { console.error("API:",e); return null; }
}

function go(id) {
  currentScreen = id;
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  event.currentTarget.classList.add("active");
  render(id);
}

async function render(id) {
  const c = document.getElementById("content");
  c.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted)"><div class="skeleton" style="width:80%;height:60px;margin:8px auto"></div><div class="skeleton" style="width:80%;height:60px;margin:8px auto"></div></div>';
  switch(id) {
    case "focus": await renderFocus(); break;
    case "projects": await renderProjects(); break;
    case "team": await renderTeam(); break;
    case "system": await renderSystem(); break;
  }
  document.getElementById("hdr-status").textContent = new Date().toLocaleTimeString("pl",{hour:"2-digit",minute:"2-digit"});
}

// ── FOCUS (Pulse) ────────────────────────────────────────────

async function renderFocus() {
  const [dash, threads] = await Promise.all([api("/api/dashboard"), api("/api/threads")]);
  if (!dash) { document.getElementById("content").innerHTML = '<div class="empty-state">Nie mozna polaczyc z serwerem</div>'; return; }

  const s = dash.stats;
  const tasks = dash.tasks || [];
  const today = new Date().toISOString().slice(0,10);

  // Kategoryzuj
  const now = tasks.filter(t => t.status === "pending_verification" || t.priority === "H" && t.status !== "closed");
  const watch = tasks.filter(t => {
    if (t.status === "closed") return false;
    if (now.includes(t)) return false;
    if (!t.deadline) return false;
    const dl = new Date(t.deadline);
    const diff = (dl - new Date()) / 86400000;
    return diff <= 3 && diff >= 0;
  });
  const overdue = tasks.filter(t => t.deadline && t.deadline < today && t.status !== "closed");

  // Badge
  const urgentCount = now.length + overdue.length;
  const badge = document.getElementById("badge-focus");
  if (urgentCount > 0) { badge.textContent = urgentCount; badge.style.display = ""; }
  else { badge.style.display = "none"; }

  // Status bar
  const total = Math.max(tasks.length, 1);
  const closedPct = tasks.filter(t=>t.status==="closed").length / total * 100;
  const progPct = tasks.filter(t=>t.status==="in_progress").length / total * 100;
  const openPct = 100 - closedPct - progPct;

  let html = `<div class="status-bar">
    <div class="status-seg" style="width:${closedPct}%;background:var(--ok)"></div>
    <div class="status-seg" style="width:${progPct}%;background:var(--warn)"></div>
    <div class="status-seg" style="width:${openPct}%;background:var(--border)"></div>
  </div>`;

  // TERAZ
  if (now.length || overdue.length) {
    html += `<div class="pulse-section">
      <div class="pulse-label"><div class="pulse-dot" style="background:var(--danger)"></div>TERAZ — wymaga decyzji</div>`;
    overdue.forEach((t,i) => { html += focusCard(t, "danger", `Przeterminowane`, i); });
    now.forEach((t,i) => {
      const label = t.status === "pending_verification" ? "Do weryfikacji" : "Priorytet H";
      html += focusCard(t, "danger", label, overdue.length + i);
    });
    html += `</div>`;
  }

  // OBSERWUJ
  if (watch.length) {
    html += `<div class="pulse-section">
      <div class="pulse-label"><div class="pulse-dot" style="background:var(--warn)"></div>OBSERWUJ — deadline blisko</div>`;
    watch.forEach((t,i) => {
      const dl = new Date(t.deadline);
      const diff = Math.ceil((dl - new Date()) / 86400000);
      const label = diff <= 0 ? "dzis" : diff === 1 ? "jutro" : `za ${diff} dni`;
      html += focusCard(t, "warn", label, i, true);
    });
    html += `</div>`;
  }

  // Wątki
  const openThreads = (threads?.threads || []).filter(t => t.status === "open");
  if (openThreads.length) {
    html += `<div class="pulse-section">
      <div class="pulse-label"><div class="pulse-dot" style="background:var(--accent)"></div>WATKI (${openThreads.length})</div>`;
    openThreads.forEach(t => {
      html += `<div class="card card-accent" style="padding:12px 16px">
        <div style="font-size:13px;font-weight:600">${t.id}: ${t.title}</div>
        <div style="font-size:11px;color:var(--muted)">od ${t.opened} &middot; ${(t.tags||[]).slice(0,3).join(', ')}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // OK
  if (!now.length && !overdue.length && !watch.length) {
    html += `<div class="card card-ok" style="text-align:center;padding:24px">
      <div style="font-size:20px;margin-bottom:8px">&#10003;</div>
      <div style="font-size:14px;font-weight:600">System sprawny</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${tasks.length} zadan &middot; ${openThreads.length} watkow &middot; 0 alertow</div>
    </div>`;
  }

  document.getElementById("content").innerHTML = html;
}

function focusCard(t, type, label, idx, noActions) {
  const delay = idx * 0.05;
  return `<div class="card card-${type}" style="animation-delay:${delay}s">
    <div style="display:flex;justify-content:space-between;align-items:start">
      <div style="flex:1">
        <div class="card-title">${t.title?.slice(0,50) || 'Zadanie'}</div>
        <div class="card-meta">${t.owner_role||t.owner_person||''} &middot; <span class="countdown countdown-${type==='danger'?'urgent':'soon'}">${label}</span></div>
      </div>
    </div>
    ${!noActions && is_ceo ? `<div class="card-actions">
      <button class="btn btn-ok" onclick="event.stopPropagation()">&#10003; Zatwierdz</button>
      <button class="btn btn-danger" onclick="event.stopPropagation()">&#10007; Odrzuc</button>
    </div>` : ''}
  </div>`;
}

// ── PROJEKTY ────────────────────────────────────────────

async function renderProjects() {
  const data = await api("/api/projects");
  if (!data) { document.getElementById("content").innerHTML = '<div class="empty-state">Brak danych</div>'; return; }
  const projects = data.projects || [];
  let html = `<div class="screen-title">Projekty (${projects.length})</div>`;

  if (!projects.length) { html += '<div class="empty-state">Brak projektow</div>'; }

  projects.forEach((p, i) => {
    const tasksPct = p.tasks_closed / Math.max(p.tasks_open + p.tasks_closed, 1) * 100;
    html += `<div class="card ${p.has_risk ? 'card-danger' : 'card-accent'}" style="animation-delay:${i*0.05}s;cursor:pointer" onclick="toggleEl('proj-${i}')">
      <div style="display:flex;justify-content:space-between">
        <div>
          <div class="card-title">${p.client}</div>
          <div class="card-meta">${p.sop||''} &middot; ${p.phase||p.status} ${p.pm ? '&middot; PM: '+p.pm : ''}</div>
        </div>
        ${p.has_risk ? '<div style="color:var(--danger);font-size:20px">&#9888;</div>' : ''}
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:13px">
        <span class="mono">${p.deadline||'—'}</span>
        ${p.budget ? '<span class="mono">'+Number(p.budget).toLocaleString('pl')+' PLN</span>' : ''}
        <span style="margin-left:auto;color:var(--ok)">${p.tasks_closed}</span>/<span>${p.tasks_open+p.tasks_closed}</span>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px;margin-top:8px">
        <div style="height:100%;width:${tasksPct}%;background:var(--ok);border-radius:2px;transition:width 0.5s"></div>
      </div>
      <div id="proj-${i}" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
        ${(p.tasks||[]).map(t => `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)">
          <span style="color:${t.priority==='H'?'var(--danger)':'var(--text)'}">${t.title?.slice(0,40)}</span>
          <span style="color:var(--muted)">${t.owner||''} ${t.deadline||''}</span>
        </div>`).join('') || '<div style="color:var(--muted);font-size:12px">Brak zadan</div>'}
      </div>
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

// ── ZESPOL ──────────────────────────────────────────────

async function renderTeam() {
  const data = await api("/api/org");
  if (!data) { document.getElementById("content").innerHTML = '<div class="empty-state">Brak danych</div>'; return; }

  const roles = Object.values(data.roles || {});
  const active = roles.filter(r => r.active);
  const empty = roles.filter(r => !r.active);

  let html = `<div class="screen-title">Zespol (${active.length} aktywnych)</div>`;

  active.forEach((r, i) => {
    const initials = (r.person || r.role).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    html += `<div class="person-card" style="animation: slideUp 0.3s ease-out ${i*0.05}s both">
      <div class="avatar avatar-active">${initials}</div>
      <div class="person-info">
        <div class="person-name">${r.person || '—'}</div>
        <div class="person-role">${r.role}</div>
      </div>
    </div>`;
  });

  if (empty.length) {
    html += `<div class="screen-title" style="margin-top:20px">Nieobsadzone (${empty.length})</div>`;
    empty.forEach(r => {
      html += `<div class="person-card" style="opacity:0.5">
        <div class="avatar avatar-empty">?</div>
        <div class="person-info">
          <div class="person-name" style="color:var(--muted)">Brak osoby</div>
          <div class="person-role">${r.role}</div>
        </div>
      </div>`;
    });
  }

  document.getElementById("content").innerHTML = html;
}

// ── SYSTEM ──────────────────────────────────────────────

async function renderSystem() {
  const [scribe, threads] = await Promise.all([api("/api/analytics/scribe"), api("/api/threads")]);
  const openThreads = (threads?.threads||[]).filter(t=>t.status==="open").length;

  let html = `<div class="screen-title">System</div>`;

  const sections = [
    {icon:"&#128209;", label:"Watki", value:`${openThreads} otwartych`, id:"sys-threads"},
    {icon:"&#128197;", label:"Spotkania", value:`${scribe?.total_meetings||0} przetworzonych`, id:"sys-meetings"},
    {icon:"&#128196;", label:"Dokumenty", value:"Biblioteka AVM", id:"sys-docs"},
    {icon:"&#128200;", label:"Analityka", value:"Tygodniowy przeglad", id:"sys-analytics"},
    {icon:"&#128260;", label:"Procesy", value:"Graf SOP + GATE", id:"sys-processes"},
    {icon:"&#128101;", label:"RACI", value:"Matryca odpowiedzialnosci", id:"sys-raci"},
  ];

  sections.forEach(s => {
    html += `<div class="sys-row" onclick="loadSystemSection('${s.id}')">
      <div style="display:flex;align-items:center">
        <span class="sys-icon">${s.icon}</span>
        <span class="sys-label">${s.label}</span>
      </div>
      <span class="sys-value">${s.value}</span>
    </div>`;
  });

  html += `<div id="sys-detail"></div>`;
  document.getElementById("content").innerHTML = html;
}

async function loadSystemSection(id) {
  const detail = document.getElementById("sys-detail");
  detail.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Ladowanie...</div>';

  if (id === "sys-threads") {
    const data = await api("/api/threads");
    const ts = data?.threads || [];
    detail.innerHTML = ts.map(t => `<div class="card card-accent" style="margin-top:8px">
      <div class="card-title">${t.id}: ${t.title}</div>
      <div class="card-meta">${t.status} &middot; od ${t.opened} &middot; ${(t.tags||[]).join(', ')}</div>
      ${(t.history||[]).slice(0,3).map(h => `<div style="font-size:11px;color:var(--muted);padding:3px 0">${h.date} — ${h.source?.slice(0,40)}</div>`).join('')}
    </div>`).join('') || '<div class="empty-state">Brak watkow</div>';
  }
  else if (id === "sys-analytics") {
    const data = await api("/api/analytics/weekly");
    const weeks = data?.weeks || [];
    detail.innerHTML = `<div style="margin-top:12px">${weeks.map(w => `<div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:4px;font-size:13px">
      <span class="mono">${w.week}</span>
      <span>Otwarte: <b>${w.open}</b></span>
      <span style="color:var(--ok)">Zamkniete: ${w.closed}</span>
      <span style="color:${w.overdue?'var(--danger)':'var(--muted)'}">Spoznione: ${w.overdue}</span>
    </div>`).join('')}</div>`;
  }
  else if (id === "sys-raci") {
    const data = await api("/api/raci");
    if (!data) return;
    const roles = data.roles || [];
    detail.innerHTML = `<div style="overflow-x:auto;margin-top:12px"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr>${['SOP',...roles].map(r=>`<th style="padding:6px;background:var(--border);color:var(--muted)">${r}</th>`).join('')}</tr>
      ${(data.matrix||[]).map(row => `<tr><td style="padding:6px;border-bottom:1px solid var(--border);font-weight:600">${row.sop}</td>
        ${roles.map(r => {const v=row[r]||''; return `<td style="padding:6px;border-bottom:1px solid var(--border);text-align:center;color:${v.includes('A')?'var(--danger)':v.includes('R')?'var(--accent)':'var(--muted)'};font-weight:${v.includes('A')?'700':'400'}">${v}</td>`;}).join('')}
      </tr>`).join('')}
    </table></div>`;
  }
  else {
    detail.innerHTML = '<div class="empty-state">Sekcja w budowie</div>';
  }
}

function toggleEl(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── INIT ────────────────────────────────────────────────

render("focus");
</script>
</body>
</html>
